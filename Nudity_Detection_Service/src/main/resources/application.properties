spring.application.name=Nudity_Detection_Service
server.port=8080

# URL of the Python AI detection service
detection.python-service.url=${PYTHON_SERVICE_URL:http://localhost:6001}

# URL of the GuardianAI Database microservice (REST APIs)
detection.db-service.url=${DB_SERVICE_URL:http://localhost:8081}

# Max in-memory buffer size for WebClient (frames can be a few MB)
spring.codec.max-in-memory-size=10MB

# Detection threshold settings
detection.confidence-threshold=0.7

logging.level.com.example.GuardianAIDetection=INFO